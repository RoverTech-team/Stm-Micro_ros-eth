<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MicroK3 Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-dark sidebar collapse">
                <div class="position-sticky pt-3">
                    <div class="sidebar-header mb-4 px-3 text-white">
                        <h3><i class="fas fa-microchip me-2"></i>MicroK3</h3>
                        <p class="text-muted small">Distributed Control System</p>
                    </div>
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                                <i class="fas fa-home me-2"></i>
                                Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/nodes' %}active{% endif %}" href="/nodes">
                                <i class="fas fa-server me-2"></i>
                                Nodes
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/network' %}active{% endif %}" href="/network">
                                <i class="fas fa-network-wired me-2"></i>
                                Network
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/failures' %}active{% endif %}" href="/failures">
                                <i class="fas fa-exclamation-triangle me-2"></i>
                                Failures
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/logs' %}active{% endif %}" href="/logs">
                                <i class="fas fa-list-alt me-2"></i>
                                Logs
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if request.path == '/configuration' %}active{% endif %}" href="/configuration">
                                <i class="fas fa-cogs me-2"></i>
                                Configuration
                            </a>
                        </li>
                    </ul>
                    
                    <div class="sidebar-footer mt-auto px-3 py-4 text-white-50 small">
                        <div class="border-top pt-3">
                            <p class="mb-1">Status: <span class="text-success">Online</span></p>
                            <p class="mb-0">Version: 0.2.1</p>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Dashboard Logic -->
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
