version: '3.8'

services:
  microk3:
    build: .
    container_name: microk3
    ports:
      - "5050:5050"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - uros-agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  uros-agent:
    image: microros/micro-ros-agent:humble
    container_name: uros-agent
    # Expose UDP port for Micro-ROS clients (STM32) to connect to
    ports:
      - "8888:8888/udp"
    # Run agent for UDPv4 on port 8888
    command: udp4 --port 8888
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    restart: unless-stopped

  renode-bridge:
    build: .
    container_name: microk3-renode-bridge
    command: ["python3", "tools/renode_heartbeat_bridge.py"]
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RENODE_NODE_ID=${RENODE_NODE_ID:-755}
      - RENODE_NODE_NAME=${RENODE_NODE_NAME:-renode-stm32h755}
      - RENODE_NODE_TYPE=${RENODE_NODE_TYPE:-Renode STM32H755}
      - RENODE_NODE_NETWORK=${RENODE_NODE_NETWORK:-Ethernet via TAP}
      - RENODE_HEARTBEAT_TOPIC=${RENODE_HEARTBEAT_TOPIC:-heartbeat}
      - RENODE_HEARTBEAT_TIMEOUT_SEC=${RENODE_HEARTBEAT_TIMEOUT_SEC:-5.0}
      - MICROK3_STATUS_TOPIC=${MICROK3_STATUS_TOPIC:-microk3/node_status}
      - MICROK3_ALERT_TOPIC=${MICROK3_ALERT_TOPIC:-microk3/system_alerts}
      - MICROK3_COMMAND_TOPIC=${MICROK3_COMMAND_TOPIC:-microk3/commands}
    depends_on:
      - uros-agent
    restart: unless-stopped
