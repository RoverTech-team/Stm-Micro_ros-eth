services:
  micro-ros-agent:
    platform: linux/arm64
    image: microros/micro-ros-agent:humble
    network_mode: host
    environment:
      - AGENT_PORT=${AGENT_PORT:-8888}
      - AGENT_BIND_ADDR=${AGENT_BIND_ADDR:-0.0.0.0}
    command: ["udp4", "-p", "${AGENT_PORT:-8888}", "-v", "4", "-d", "${ROS_DOMAIN_ID:-0}"]

  microk3:
    platform: linux/arm64
    build:
      context: ../../microrosWs/microk3
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=${DASHBOARD_PORT:-5050}
      - SECRET_KEY=${SECRET_KEY:-e2e-test-secret-key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-testpass123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - RMW_FASTRTPS_USE_SHM=0
      - DATA_FILE=/app/data/system_data.json
      - LOG_FILE=/app/logs/microk3.log
      - MICROROS_DISABLE_SHM=1
    volumes:
      - microk3_hil_data:/app/data
      - microk3_hil_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DASHBOARD_PORT:-5050}/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  renode-bridge:
    platform: linux/arm64
    build:
      context: ../../microrosWs/microk3
      dockerfile: Dockerfile
    command: ["python3", "tools/renode_heartbeat_bridge.py"]
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - ROS_LOCALHOST_ONLY=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - RMW_FASTRTPS_USE_SHM=0
      - MICROROS_DISABLE_SHM=1
      - RENODE_NODE_ID=${RENODE_NODE_ID:-755}
      - RENODE_NODE_NAME=${RENODE_NODE_NAME:-stm32h755}
      - RENODE_NODE_TYPE=${RENODE_NODE_TYPE:-STM32H755}
      - RENODE_NODE_NETWORK=${RENODE_NODE_NETWORK:-Ethernet}
      - RENODE_HEARTBEAT_TOPIC=${RENODE_HEARTBEAT_TOPIC:-heartbeat}
      - RENODE_HEARTBEAT_TIMEOUT_SEC=${RENODE_HEARTBEAT_TIMEOUT_SEC:-5.0}
      - MICROK3_STATUS_TOPIC=${MICROK3_STATUS_TOPIC:-microk3/node_status}
      - MICROK3_ALERT_TOPIC=${MICROK3_ALERT_TOPIC:-microk3/system_alerts}
      - MICROK3_COMMAND_TOPIC=${MICROK3_COMMAND_TOPIC:-microk3/commands}
      - HEARTBEAT_LOG_INTERVAL_SEC=${HEARTBEAT_LOG_INTERVAL_SEC:-30}
    depends_on:
      microk3:
        condition: service_healthy
      micro-ros-agent:
        condition: service_started

volumes:
  microk3_hil_data:
  microk3_hil_logs:
