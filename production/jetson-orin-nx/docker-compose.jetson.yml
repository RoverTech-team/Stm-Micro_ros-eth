services:
  firmware-build:
    platform: linux/arm64
    build:
      context: ../../microrosWs/tests/e2e
      dockerfile: Dockerfile.firmware-build
    working_dir: /workspace
    command:
      - >
        make -C /workspace/microrosWs/Micro_ros_eth/microroseth/Makefile/CM4 -j$(nproc)
        && make -C /workspace/microrosWs/Micro_ros_eth/microroseth/Makefile/CM7 -j$(nproc)
    volumes:
      - ../../:/workspace:rw
    networks:
      - renode_jetson_net

  microk3:
    platform: linux/arm64
    build:
      context: ../../microrosWs/microk3
      dockerfile: Dockerfile
    ports:
      - "${DASHBOARD_PORT:-5050}:5050"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5050
      - SECRET_KEY=${SECRET_KEY:-e2e-test-secret-key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-testpass123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - DATA_FILE=/app/data/system_data.json
      - LOG_FILE=/app/logs/microk3.log
      - MICROROS_DISABLE_SHM=1
    volumes:
      - microk3_jetson_data:/app/data
      - microk3_jetson_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - renode_jetson_net

  renode-bridge:
    platform: linux/arm64
    build:
      context: ../../microrosWs/microk3
      dockerfile: Dockerfile
    command: ["python3", "tools/renode_heartbeat_bridge.py"]
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - MICROROS_DISABLE_SHM=1
      - RENODE_NODE_ID=${RENODE_NODE_ID:-755}
      - RENODE_NODE_NAME=${RENODE_NODE_NAME:-renode-stm32h755}
      - RENODE_NODE_TYPE=${RENODE_NODE_TYPE:-Renode STM32H755}
      - RENODE_NODE_NETWORK=${RENODE_NODE_NETWORK:-Docker Renode TAP}
      - RENODE_HEARTBEAT_TOPIC=${RENODE_HEARTBEAT_TOPIC:-heartbeat}
      - RENODE_HEARTBEAT_TIMEOUT_SEC=${RENODE_HEARTBEAT_TIMEOUT_SEC:-5.0}
      - MICROK3_STATUS_TOPIC=${MICROK3_STATUS_TOPIC:-microk3/node_status}
      - MICROK3_ALERT_TOPIC=${MICROK3_ALERT_TOPIC:-microk3/system_alerts}
      - MICROK3_COMMAND_TOPIC=${MICROK3_COMMAND_TOPIC:-microk3/commands}
    depends_on:
      microk3:
        condition: service_healthy
      renode-e2e:
        condition: service_started
    networks:
      - renode_jetson_net

  renode-e2e:
    platform: linux/arm64
    build:
      context: ../../microrosWs/tests/e2e
      dockerfile: Dockerfile.renode-e2e
    privileged: true
    cap_add:
      - NET_ADMIN
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - MICROROS_DISABLE_SHM=1
      - TAP_INTERFACE=${TAP_INTERFACE:-tap0}
      - TAP_GATEWAY_CIDR=${TAP_GATEWAY_CIDR:-192.168.50.1/24}
      - AGENT_PORT=${AGENT_PORT:-8888}
      - AGENT_START_DELAY_SEC=${AGENT_START_DELAY_SEC:-0}
      - AGENT_RESTART_AFTER_SEC=${AGENT_RESTART_AFTER_SEC:-0}
      - AGENT_RESTART_DOWNTIME_SEC=${AGENT_RESTART_DOWNTIME_SEC:-0}
      - TAP_FLAP_AFTER_SEC=${TAP_FLAP_AFTER_SEC:-0}
      - TAP_FLAP_DOWNTIME_SEC=${TAP_FLAP_DOWNTIME_SEC:-0}
      - RENODE_RESTART_AFTER_SEC=${RENODE_RESTART_AFTER_SEC:-0}
      - RENODE_RESTART_DOWNTIME_SEC=${RENODE_RESTART_DOWNTIME_SEC:-0}
      - RENODE_SCRIPT=${RENODE_SCRIPT:-/workspace/microrosWs/tests/e2e/renode/microroseth_docker_tap.resc}
      - WORKSPACE=/workspace
      - CM4_ELF=/workspace/microrosWs/Micro_ros_eth/microroseth/Makefile/CM4/build/MicroRosEth_CM4.elf
      - CM7_ELF=/workspace/microrosWs/Micro_ros_eth/microroseth/Makefile/CM7/build/MicroRosEth_CM7.elf
    volumes:
      - ../../:/workspace:rw
    networks:
      - renode_jetson_net
    depends_on:
      firmware-build:
        condition: service_completed_successfully

networks:
  renode_jetson_net:
    driver: bridge

volumes:
  microk3_jetson_data:
  microk3_jetson_logs:
