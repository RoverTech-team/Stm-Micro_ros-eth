services:
  microk3:
    build:
      context: ../../microk3
      dockerfile: Dockerfile
    container_name: microk3_e2e
    ports:
      - "${DASHBOARD_PORT:-5050}:5050"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5050
      - SECRET_KEY=${SECRET_KEY:-e2e-test-secret-key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-testpass123}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - DATA_FILE=/app/data/system_data.json
      - LOG_FILE=/app/logs/microk3.log
    volumes:
      - microk3_e2e_data:/app/data
      - microk3_e2e_logs:/app/logs
    depends_on:
      uros-agent:
        condition: service_started
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - microk3_e2e_net

  uros-agent:
    image: microros/micro-ros-agent:humble
    container_name: uros_agent_e2e
    ports:
      - "${AGENT_PORT:-8888}:8888/udp"
    command: udp4 --port 8888 -v6
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
    restart: "no"
    networks:
      - microk3_e2e_net

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: microk3_test_runner
    depends_on:
      microk3:
        condition: service_healthy
    environment:
      - DASHBOARD_URL=http://microk3:5050
      - AGENT_HOST=uros-agent
      - AGENT_PORT=8888
      - DASHBOARD_PORT=${DASHBOARD_PORT:-5050}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-testpass123}
      - STARTUP_TIMEOUT=60
      - HEALTH_CHECK_INTERVAL=2
      - HEALTH_CHECK_RETRIES=30
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RUNNING_IN_DOCKER=1
      - COMPOSE_PROJECT_NAME=microk3_e2e_test
      - ENABLE_TAP_TESTS=${ENABLE_TAP_TESTS:-false}
    volumes:
      - ./test_results:/app/test_results
      - ./reports:/app/reports
      - .:/app/tests:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - microk3_e2e_net
    profiles:
      - test

  test-runner-tap:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: microk3_test_runner_tap
    depends_on:
      microk3:
        condition: service_healthy
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    environment:
      - DASHBOARD_URL=http://localhost:5050
      - AGENT_HOST=localhost
      - AGENT_PORT=8888
      - DASHBOARD_PORT=${DASHBOARD_PORT:-5050}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-testpass123}
      - STARTUP_TIMEOUT=60
      - HEALTH_CHECK_INTERVAL=2
      - HEALTH_CHECK_RETRIES=30
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-0}
      - RUNNING_IN_DOCKER=1
      - COMPOSE_PROJECT_NAME=microk3_e2e_test
      - ENABLE_TAP_TESTS=true
    volumes:
      - ./test_results:/app/test_results
      - ./reports:/app/reports
      - .:/app/tests:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ../../Renode.app:/app/Renode.app:ro
      - ../../Micro_ros_eth:/app/Micro_ros_eth:ro
      - ../simulation:/app/simulation:ro
    network_mode: host
    profiles:
      - tap

networks:
  microk3_e2e_net:
    driver: bridge
    name: microk3_network
    attachable: true

volumes:
  microk3_e2e_data:
  microk3_e2e_logs: